name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-nix:
    name: Build ${{ matrix.name }} with Nix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            artifact: nju-cli-linux-x86_64.tar.gz
          - os: macos-14
            name: macos-aarch64
            artifact: nju-cli-macos-aarch64.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v14

      - name: Build nju-cli
        run: nix build --accept-flake-config .#nju-cli

      - name: Push to Nix binary cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
          NIX_SIGNING_KEY: ${{ secrets.NIX_SIGNING_KEY }}
        run: |
          if [ -z "${ATTIC_TOKEN}" ] || [ -z "${NIX_SIGNING_KEY}" ]; then
            echo "ATTIC_TOKEN or NIX_SIGNING_KEY is not set; skip Nix cache push."
            exit 0
          fi

          key_file="${RUNNER_TEMP}/nix-signing-key.pem"
          printf '%s\n' "${NIX_SIGNING_KEY}" > "${key_file}"
          chmod 600 "${key_file}"

          out="$(readlink -f result)"
          nix store sign --key-file "${key_file}" --recursive "${out}"

          nix shell nixpkgs#attic-client -c attic login --set-default nju-cli https://nix-binary-cache.ken.com.im/ "${ATTIC_TOKEN}"
          nix shell nixpkgs#attic-client -c attic push nju-cli:nju-cli "${out}"

      - name: Package binary
        run: |
          mkdir -p dist
          tar -C result/bin -czf "dist/${{ matrix.artifact }}" nju-cli

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  build-windows:
    name: Build windows-x86_64 with Cargo
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build nju-cli
        run: cargo build --locked --release -p cli

      - name: Package binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path target/release/nju-cli.exe -DestinationPath dist/nju-cli-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: nju-cli-windows-x86_64.zip
          path: dist/nju-cli-windows-x86_64.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs:
      - build-nix
      - build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          name: ${{ github.ref_name }}
          body: Automated nju-cli release.

      - name: Sync binaries into Codex marketplace
        env:
          GH_TOKEN: ${{ secrets.MARKETPLACE_SYNC_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "MARKETPLACE_SYNC_TOKEN is not set; skip marketplace sync trigger."
            exit 0
          fi
          gh workflow run sync-cli-binaries.yml \
            --repo nju-cli/codex-marketplace \
            --ref main \
            -f release_tag="${GITHUB_REF_NAME}"
